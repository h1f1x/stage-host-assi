<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Stage Host · Frannz Salon · Di 9. Juni</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700;12..96,800&family=Archivo:wght@400;500;600&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css?v=2">
</head>
<body>
<div id="flash" aria-hidden="true"></div>
<div class="app">
  <div class="top">
    <div class="brand">Berlin <b>Buzzwords</b> · Stage Host</div>
    <button class="gear" id="gear" aria-label="Einstellungen">⚙</button>
    <div class="clock" id="clock">--:--:--</div>
  </div>
  <div class="rail" id="rail"></div>
  <div class="stage" id="stage"></div>
  <div class="nav">
    <button class="home" id="homeBtn" aria-label="Agenda">☰</button>
    <button class="prev" id="prevBtn" aria-label="Zurück">‹</button>
    <button class="next" id="nextBtn">Weiter ›</button>
  </div>

  <div class="sheet" id="sheet">
    <div class="panel">
      <div class="schedwrap" id="schedWrap">
        <h3>Bühne &amp; Tag</h3>
        <p>Welches Programm möchtest du hosten?</p>
        <select id="schedSel" class="schedsel" aria-label="Schedule wählen"></select>
      </div>
      <h3>Programm-Versatz</h3>
      <p>Standard ist die geplante Uhrzeit aus dem Schedule. Läuft das Programm vor oder nach, kannst du hier alle Countdowns verschieben.</p>
      <div class="offset">
        <button id="offMinus">−</button>
        <div class="val"><span id="offVal">0</span> min<small id="offHint">nach Plan</small></div>
        <button id="offPlus">+</button>
      </div>
      <div class="testrow">
        <button id="test10">▶ Test 10-Min</button>
        <button id="test5">▶ Test 5-Min</button>
      </div>
      <button class="close" id="closeSheet">Fertig</button>
      <button class="reset" id="resetState">Häkchen & Anwesenheit zurücksetzen</button>
    </div>
  </div>

  <div class="fs" id="fs">
    <div class="num" id="fsNum">–</div>
    <div class="unit" id="fsUnit">min</div>
    <div class="sub" id="fsSub"></div>
    <div class="hintc">tippen zum Schließen</div>
  </div>
</div>

<script>
/* ---------- schedule data (loaded at runtime from a JSON file) ----------
   Content lives in v2/data/*.json — see SCHEMA.md for the format.
   Choose a schedule via the URL:  ?data=data/<file>.json
   (default: Frannz Salon · Tue 9 Jun 2026). */
let talks   = [];      // per-talk objects (see schema); each t.next is derived below
let BREAKS  = [];      // [{ afterTalk, name, start, end }]
let CLOSING = null;    // { label, time, room }
let META    = {};      // { event, room, date, dayLabel, agendaTitle, avatarBase }
let DAY     = [2026,5,9]; // [year, month0-based, day] — derived from meta.date
let AV      = "";         // avatar base url — from meta.avatarBase

function parseDate(s){ const [y,m,d]=String(s).split("-").map(Number); return [y,(m||1)-1,d||1]; }

// derive each talk's "next" pointer (next talk / break / closing) from the ordered schedule
function buildNext(){
  talks.forEach((t,i)=>{
    const nextTalk  = talks[i+1] || null;
    const afterTalk = nextTalk ? {time:nextTalk.start, desc:`Talk ${nextTalk.n} · ${nextTalk.speaker}`} : null;
    const afterClose= CLOSING  ? {time:CLOSING.time,  desc:`${CLOSING.label} · ${CLOSING.room}`} : null;
    const brk = BREAKS.find(b=>b.afterTalk===t.n);
    if(brk){
      t.next = {kind:"break", time:brk.start, desc:brk.name, brkEnd:brk.end, after: afterTalk||afterClose};
    } else if(nextTalk){
      t.next = {kind:"talk", time:nextTalk.start, desc:`Talk ${nextTalk.n} · ${nextTalk.speaker}`, after:null};
    } else {
      t.next = {kind:"event", time:(CLOSING?CLOSING.time:t.end), desc:(afterClose?afterClose.desc:""), after:null};
    }
  });
}

function applySchedule(s){
  META    = s.meta || {};
  AV      = META.avatarBase || "";
  if(META.date) DAY = parseDate(META.date);
  BREAKS  = Array.isArray(s.breaks) ? s.breaks : [];
  CLOSING = s.closing || null;
  talks = (s.talks || []).map((t,i)=>{
    const photo = /^https?:\/\//.test(t.photo||"") ? t.photo : AV + (t.photo||"");
    return {...t, n: (t.n!=null ? t.n : i+1), photo};
  });
  buildNext();
  if(META.room) document.title = "Stage Host · " + META.room;
}

/* ---------- time helpers ---------- */
function hm(str){const [h,m]=str.split(":").map(Number);const d=new Date(DAY[0],DAY[1],DAY[2],h,m,0,0);return d;}
let offsetMin = 0; // schedule offset
function nowAdj(){ return new Date(Date.now() - offsetMin*60000); } // subtracting offset = "Programm läuft +X min später"
function fmtClock(d){return d.toLocaleTimeString("de-DE",{hour:"2-digit",minute:"2-digit",second:"2-digit"});}
function pad(n){return String(n).padStart(2,"0");}
function fmtHM(d){return pad(d.getHours())+":"+pad(d.getMinutes());}
function effEnd(t){return new Date(hm(t.end).getTime() + ((endShift[t.n]||0)*60000));}
function diffParts(ms){const s=Math.max(0,Math.round(ms/1000));return {m:Math.floor(s/60),s:s%60,neg:ms<0};}

/* ---------- state ---------- */
let slides = [];           // flat list {talkIdx, kind}
let cur = 0;
const att = {};            // attendance per talk n
const checks = {};         // checklist done per "n-key"
const endShift = {};       // per-talk end-time shift in minutes
let fsOpen = false;        // fullscreen speaker timer

function buildSlides(){
  slides = [{kind:"agenda"}];
  talks.forEach((t,i)=>{
    slides.push({kind:"overview",ti:i});
    slides.push({kind:"anmod",ti:i});
    slides.push({kind:"count",ti:i});
  });
}

/* ---------- rendering ---------- */
const stage=document.getElementById("stage");
const rail=document.getElementById("rail");

function render(){
  if(window.speechSynthesis) window.speechSynthesis.cancel();
  // rail
  rail.innerHTML="";
  slides.forEach((s,i)=>{
    const seg=document.createElement("div");
    seg.className="seg"+(i<cur?" done":"")+(i===cur?" active":"");
    rail.appendChild(seg);
  });
  // slide
  const s=slides[cur];
  let html="";
  if(s.kind==="agenda") html=renderAgenda();
  else if(s.kind==="overview") html=renderOverview(talks[s.ti]);
  else if(s.kind==="anmod") html=renderAnmod(talks[s.ti]);
  else if(s.kind==="count") html=renderCount(talks[s.ti]);
  stage.innerHTML=`<div class="slide show">${html}</div>`;
  bindSlide(s);
  document.getElementById("prevBtn").disabled = cur===0;
  const nb=document.getElementById("nextBtn");
  nb.textContent = cur>=slides.length-1 ? "Ende" : "Weiter ›";
  nb.disabled = cur>=slides.length-1;
}

function curState(){
  const n=nowAdj();
  // find current/next talk for agenda highlight
  let idx=-1;
  for(let i=0;i<talks.length;i++){
    if(n < hm(talks[i].end)){ idx=i; break; }
  }
  return {n, liveIdx:idx};
}

function renderAgenda(){
  const {n,liveIdx}=curState();
  let rows="";
  talks.forEach((t,i)=>{
    const isNow = (i===liveIdx);
    const tag = isNow ? `<span class="nowtag">${n>=hm(t.start)?'LÄUFT':'GLEICH'}</span>` : "";
    rows+=`<div class="row ${isNow?'now':''}" data-go="${1+i*3}">
      <div class="t">${t.start}</div>
      <div><div class="tt">${esc(t.title)}${tag}</div><div class="sp">${esc(t.speaker)}</div></div>
      <div class="num">${t.n}</div></div>`;
    const b = BREAKS.find(x=>x.afterTalk===t.n);
    if(b) rows+=`<div class="brk">${esc(b.name)} · ${b.start} – ${b.end}</div>`;
  });
  if(CLOSING) rows+=`<div class="brk">${esc(CLOSING.label)} · ${CLOSING.time} · ${esc(CLOSING.room)}</div>`;
  const count=talks.length, range=count?`${talks[0].start} – ${talks[count-1].end}`:"";
  const sub = count ? `<b>${count} Sessions</b> · ${range} · tippe einen Talk an` : `Noch kein Programm hinterlegt`;
  const note = count ? "" :
    `<div class="anm-hint" style="margin-top:6px">📝 <span>Programm in <b>${esc(scheduleFile())}</b> eintragen — siehe <b>SCHEMA.md</b> (inkl. LLM-Prompt).</span></div>`;
  return `<div class="agenda">
    <div class="kicker"><span class="pill">${esc((META.room||"").toUpperCase())}</span> ${esc(META.dayLabel||"")}</div>
    <h1>${esc(META.agendaTitle||"Deine Talks heute")}</h1>
    <div class="sub">${sub}</div>
    ${note}
    <div class="list">${rows}</div>
  </div>`;
}

function renderOverview(t){
  return `<div class="kicker"><span class="pill">TALK ${t.n}/${talks.length}</span> ${esc(t.type)}</div>
    <div class="timeblock">${t.start} – ${t.end} <span class="dur">· ${esc(META.room||"")}</span></div>
    <div class="ov-title">${esc(t.title)}</div>
    <div class="spk">
      <img class="ava" src="${t.photo}" alt="${esc(t.speaker)}"
           onerror="this.outerHTML='<div class=&quot;ava ph&quot;>${initials(t.speaker)}</div>'">
      <div><div class="nm">${esc(t.speaker)}</div><div class="rl">${esc(t.role)}</div></div>
    </div>
    <div class="tags">${t.tags.map(x=>`<span class="tag">${esc(x)}</span>`).join("")}</div>
    <div class="links">${t.links.map(x=>`<a class="lnk" href="${x.u}" target="_blank" rel="noopener">${esc(x.l)} ↗</a>`).join("")}</div>
    <div class="startbox">
      <div class="startlabel" id="ovlab">beginnt in</div>
      <div class="starttime" id="ovtime" data-start="${t.start}" data-end="${t.end}">– min</div>
      <div class="startclock">${t.start} Uhr</div>
    </div>`;
}

function renderAnmod(t){
  return `<div class="kicker">Anmoderation · <span class="ph">Talk ${t.n}</span></div>
    <div class="anm-name">${esc(t.title)} · <span>${esc(t.speaker)}</span></div>
    <div class="script">${splitSentences(t.intro).map(x=>`<span class="sent">${esc(x)}</span>`).join("")}<span class="hand">${esc(t.hand)}</span></div>
    <button class="ttsbtn" id="ttsBtn">🔊&nbsp;Vorlesen</button>
    <div class="anm-hint">🎤 <span><b>Vor dem Talk:</b> Mikro beim Audio-Engineer abholen, Laptop an HDMI anschließen, fragen wie viel Zeit für Q&amp;A geplant ist (ist in der Session-Zeit enthalten).</span></div>`;
}

function renderCount(t){
  const nx=t.next;
  let whenCls = nx.kind==="break" ? "brk" : "";
  let nextMain = `<span class="when ${whenCls}">${nx.time}</span><span class="desc">${esc(nx.desc)}${nx.brkEnd?` (bis ${nx.brkEnd})`:''}</span><span class="delta" id="nxdelta"></span>`;
  let afterLine = nx.after ? `<div class="after">danach ${nx.after.time} · ${esc(nx.after.desc)}</div>` : "";
  if(nx.kind==="event") afterLine = `<div class="after">Das war dein letzter Talk heute 🎉 — danke!</div>`;
  const aSel=att[t.n]||"";
  return `<div class="kicker">Restzeit · <span class="ph">Talk ${t.n}</span> · Ende geplant ${t.end}</div>
    <div class="cd-wrap">
      <div class="cd-for"><b>${esc(t.speaker)}</b> — ${esc(t.title)}</div>
      <div class="cd-time" id="cdtime" data-start="${t.start}" data-end="${t.end}">--:--</div>
      <div class="cd-state" id="cdstate"></div>
      <div class="fstip">↗ auf die Zeit tippen = Vollbild für den Speaker</div>
      <div class="cue" id="cue"></div>
      <div class="checklist">
        ${chk(t.n,"thank","Speaker gedankt")}
        ${chk(t.n,"archive","Fragen archiviert")}
      </div>
      <div class="att">Auslastung:
        <span class="opt ${aSel==='low'?'sel':''}" data-att="${t.n}" data-val="low">niedrig</span>
        <span class="opt ${aSel==='med'?'sel':''}" data-att="${t.n}" data-val="med">mittel</span>
        <span class="opt ${aSel==='full'?'sel':''}" data-att="${t.n}" data-val="full">voll</span>
      </div>
      <div class="endshift">Ende <span class="eff" id="effend">${t.end}</span>
        <button data-endn="${t.n}" data-dir="-1" aria-label="Ende minus 1 Minute">−1</button>
        <button data-endn="${t.n}" data-dir="1" aria-label="Ende plus 1 Minute">+1</button>
        <span class="info" id="endinfo"></span>
      </div>
    </div>
    <div class="nextbar">
      <div class="lab">Als Nächstes</div>
      <div class="main">${nextMain}</div>
      ${afterLine}
    </div>`;
}
function chk(n,key,label){const on=checks[n+"-"+key]?"done":"";return `<span class="chk ${on}" data-chk="${n}-${key}">${esc(label)}</span>`;}

/* ---------- live ticking ---------- */
function updateFs(t,st,en,n){
  const num=document.getElementById("fsNum"),unit=document.getElementById("fsUnit"),sub=document.getElementById("fsSub");
  if(!num) return;
  num.className="num";
  const rem=(n<st)?(en-st):(en-n);
  if(rem>0){
    const mins=Math.ceil(rem/60000),p=diffParts(rem);
    num.textContent=mins; unit.textContent="min"; sub.textContent=`${pad(p.m)}:${pad(p.s)}`;
    if(n>=st){const ml=rem/60000; if(ml<=5)num.classList.add("red"); else if(ml<=10)num.classList.add("amber");}
  } else {
    const o=diffParts(n-en);
    num.textContent="0"; num.classList.add("red"); unit.textContent="min"; sub.textContent=`+${pad(o.m)}:${pad(o.s)} über`;
  }
}

function resetTtsBtn(btn){if(btn){btn.classList.remove("on");btn.innerHTML="🔊&nbsp;Vorlesen";}}
function toggleTts(t,btn){
  const synth=window.speechSynthesis;
  if(!synth){btn.textContent="🔇 nicht verfügbar";btn.disabled=true;return;}
  if(synth.speaking){synth.cancel();resetTtsBtn(btn);return;}
  const u=new SpeechSynthesisUtterance(t.intro+"  "+t.hand);
  u.lang="en-US";u.rate=0.95;u.pitch=1;
  const v=synth.getVoices().find(x=>/^en[-_]/i.test(x.lang)||x.lang==="en");
  if(v)u.voice=v;
  u.onend=()=>resetTtsBtn(btn);
  u.onerror=()=>resetTtsBtn(btn);
  btn.classList.add("on");btn.innerHTML="⏹&nbsp;Stopp";
  synth.cancel();synth.speak(u);
}

function tick(){
  document.getElementById("clock").textContent=fmtClock(new Date());
  const s=slides[cur];
  const n=nowAdj();
  if(s.kind==="overview"){
    const t=talks[s.ti];
    const el=document.getElementById("ovtime"), lab=document.getElementById("ovlab");
    if(el){
      const st=hm(t.start), en=effEnd(t);
      el.className="starttime";
      if(n<st){const mins=Math.ceil((st-n)/60000);el.innerHTML=`${mins}<span class="u"> min</span>`;el.classList.add("soon");lab.textContent="beginnt in";}
      else if(n<en){const mins=Math.ceil((en-n)/60000);el.innerHTML=`${mins}<span class="u"> min</span>`;el.classList.add("live");lab.textContent="läuft · noch";}
      else{el.textContent="beendet";el.classList.add("done");lab.textContent="abgeschlossen";}
    }
  }
  if(s.kind==="count"){
    const t=talks[s.ti];
    const el=document.getElementById("cdtime");
    if(el){
      const st=hm(t.start), en=effEnd(t), sh=endShift[t.n]||0;
      const state=document.getElementById("cdstate"), cue=document.getElementById("cue");
      const ee=document.getElementById("effend"); if(ee) ee.textContent=fmtHM(en);
      const ei=document.getElementById("endinfo"); if(ei) ei.textContent= sh!==0?`(${sh>0?'+':''}${sh} min)`:"";
      el.className="cd-time";cue.className="cue";
      if(n<st){
        const ps=diffParts(st-n);
        el.textContent=`${pad(diffParts(en-st).m)}:00`;el.classList.add("idle");
        state.textContent=`Talk startet in ${pad(ps.m)}:${pad(ps.s)} (Plan)`;
      } else if(n<en){
        const left=en-n;const p=diffParts(left);
        el.textContent=`${pad(p.m)}:${pad(p.s)}`;
        const minLeft=left/60000;
        if(minLeft<=5){el.classList.add("red");cue.classList.add("on","c5");cue.textContent="🟥 5-Min-Karte zeigen";}
        else if(minLeft<=10){el.classList.add("amber");cue.classList.add("on","c10");cue.textContent="🟧 10-Min-Karte zeigen";}
        state.textContent="verbleibend";
      } else {
        const over=diffParts(n-en);
        el.textContent=`+${pad(over.m)}:${pad(over.s)}`;el.classList.add("over");
        state.textContent="ÜBER PLAN · bitte zum Schluss kommen";
        cue.classList.add("on","c5");cue.textContent="🔴 Session beenden & Speaker danken";
      }
      const dxEl=document.getElementById("nxdelta");
      if(dxEl){const nx=t.next;const d=Math.round((hm(nx.time)-en)/60000);dxEl.textContent= d>=0?`+${d} Min nach Talk-Ende`:`${d} Min – Überschneidung`;}
      if(fsOpen) updateFs(t,st,en,n);
    }
  }
}

/* ---------- interactions ---------- */
function bindSlide(s){
  stage.querySelectorAll("[data-go]").forEach(el=>el.onclick=()=>{cur=+el.dataset.go;render();});
  stage.querySelectorAll("[data-chk]").forEach(el=>el.onclick=()=>{const k=el.dataset.chk;checks[k]=!checks[k];el.classList.toggle("done");});
  stage.querySelectorAll("[data-att]").forEach(el=>el.onclick=()=>{
    const n=el.dataset.att; att[n]=el.dataset.val;
    el.parentElement.querySelectorAll(".opt").forEach(o=>o.classList.remove("sel"));el.classList.add("sel");
  });
  stage.querySelectorAll("[data-endn]").forEach(el=>el.onclick=()=>{
    const k=el.dataset.endn; endShift[k]=(endShift[k]||0)+parseInt(el.dataset.dir,10); tick();
  });
  const cdt=document.getElementById("cdtime"); if(cdt) cdt.onclick=()=>toggleFs(true);
  const ttsBtn=document.getElementById("ttsBtn"); if(ttsBtn){const t=talks[s.ti]; ttsBtn.onclick=()=>toggleTts(t,ttsBtn);}
  tick();
}
function go(d){if(fsOpen)return;const t=cur+d;if(t>=0&&t<slides.length){cur=t;render();}}
document.getElementById("nextBtn").onclick=()=>go(1);
document.getElementById("prevBtn").onclick=()=>go(-1);
document.getElementById("homeBtn").onclick=()=>{cur=0;render();};
document.addEventListener("keydown",e=>{
  if(e.key==="Escape"&&fsOpen){toggleFs(false);return;}
  if(fsOpen)return;
  if(e.key==="ArrowRight")go(1);
  else if(e.key==="ArrowLeft")go(-1);
  else if(e.key==="ArrowUp"){cur=0;render();}
});
// swipe
let sx=0;
stage.addEventListener("touchstart",e=>sx=e.touches[0].clientX,{passive:true});
stage.addEventListener("touchend",e=>{const dx=e.changedTouches[0].clientX-sx;if(Math.abs(dx)>55)go(dx<0?1:-1);},{passive:true});

/* settings */
const sheet=document.getElementById("sheet");
const fs=document.getElementById("fs");
function toggleFs(v){fsOpen=(v===undefined)?!fsOpen:v;fs.classList.toggle("open",fsOpen);if(fsOpen)tick();}
fs.onclick=()=>toggleFs(false);
document.getElementById("gear").onclick=()=>sheet.classList.add("open");
document.getElementById("closeSheet").onclick=()=>sheet.classList.remove("open");
sheet.onclick=e=>{if(e.target===sheet)sheet.classList.remove("open");};
function setOff(v){offsetMin=v;document.getElementById("offVal").textContent=(v>0?"+":"")+v;
  document.getElementById("offHint").textContent = v===0?"nach Plan":(v>0?"Programm läuft später":"Programm läuft früher");}
document.getElementById("offPlus").onclick=()=>setOff(offsetMin+1);
document.getElementById("offMinus").onclick=()=>setOff(offsetMin-1);
document.getElementById("resetState").onclick=()=>{for(const k in checks)delete checks[k];for(const k in att)delete att[k];for(const k in endShift)delete endShift[k];setOff(0);render();sheet.classList.remove("open");};

/* helpers */
function esc(s){return String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}
function splitSentences(txt){const m=txt.match(/[^.!?]+[.!?]+["”’']*/g);return m?m.map(s=>s.trim()):[txt];}
function initials(name){return name.split(" ").map(w=>w[0]).slice(0,2).join("").toUpperCase();}

/* ---------- threshold alerts (v2): sound + screen flash at 10 & 5 min ---------- */
let audioCtx=null;
function unlockAudio(){
  try{ if(!audioCtx) audioCtx=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){}
  if(audioCtx&&audioCtx.state==="suspended") audioCtx.resume();
}
// browsers require a user gesture before audio can play
document.addEventListener("pointerdown",unlockAudio);
document.addEventListener("keydown",unlockAudio);

function beep(freq,start,dur,vol){
  if(!audioCtx) return;
  const t0=audioCtx.currentTime+start;
  const osc=audioCtx.createOscillator(), g=audioCtx.createGain();
  osc.type="square"; osc.frequency.value=freq;
  g.gain.setValueAtTime(0,t0);
  g.gain.linearRampToValueAtTime(vol,t0+0.012);
  g.gain.setValueAtTime(vol,t0+Math.max(0.02,dur-0.04));
  g.gain.linearRampToValueAtTime(0,t0+dur);
  osc.connect(g).connect(audioCtx.destination);
  osc.start(t0); osc.stop(t0+dur+0.02);
}
function playCue(level){
  unlockAudio();
  if(level===10){ beep(680,0,0.16,0.18); beep(680,0.24,0.16,0.18); }          // 10 min: two calm beeps
  else { beep(880,0,0.14,0.20); beep(880,0.2,0.14,0.20); beep(880,0.4,0.24,0.22); } // 5 min: three urgent beeps
}

const flashEl=document.getElementById("flash");
let flashTimer=null;
function stopFlash(){
  if(!flashEl) return;
  flashEl.classList.remove("on10","on5");
  clearTimeout(flashTimer);
}
function flashScreen(level){
  if(!flashEl) return;
  flashEl.classList.remove("on10","on5");
  void flashEl.offsetWidth;                 // force reflow so the animation restarts
  flashEl.classList.add(level===5?"on5":"on10");
  clearTimeout(flashTimer);
  flashTimer=setTimeout(()=>flashEl.classList.remove("on10","on5"),8000);
}
// tap anywhere on the flashing overlay to stop it early (overlay only catches taps while active)
if(flashEl) flashEl.addEventListener("pointerdown",e=>{e.preventDefault();e.stopPropagation();stopFlash();});
function fireAlert(level){ playCue(level); flashScreen(level); }

// per-talk crossing detection so each threshold fires once, only while the talk runs
const alertSt={};
function checkAlerts(){
  const n=nowAdj();
  talks.forEach(t=>{
    const st=hm(t.start), en=effEnd(t);
    const a=alertSt[t.n]||(alertSt[t.n]={prev:undefined,f10:false,f5:false});
    if(n>=st && n<en){
      const rem=(en-n)/60000; // minutes remaining
      if(a.prev!==undefined){
        if(!a.f10 && a.prev>10 && rem<=10){ a.f10=true; fireAlert(10); }
        if(!a.f5  && a.prev>5  && rem<=5 ){ a.f5=true;  fireAlert(5);  }
      }
      a.prev=rem;
    } else {
      a.prev=undefined; // outside the talk window — don't fire on (re)entry
    }
  });
}
setInterval(checkAlerts,1000);

// quick-test buttons in the settings sheet (click is a valid audio gesture)
document.getElementById("test10").onclick=()=>{unlockAudio();fireAlert(10);};
document.getElementById("test5").onclick=()=>{unlockAudio();fireAlert(5);};

/* boot — load the schedule JSON, then start the app */
function scheduleFile(){
  return new URLSearchParams(location.search).get("data") || "data/frannz-salon-2026-06-09.json";
}
// populate the settings chooser from data/index.json (list of available schedules)
async function loadScheduleMenu(){
  const sel=document.getElementById("schedSel"), wrap=document.getElementById("schedWrap");
  if(!sel) return;
  try{
    const res=await fetch("data/index.json",{cache:"no-cache"});
    if(!res.ok) throw new Error();
    const list=(await res.json()).schedules||[];
    if(!list.length) throw new Error();
    const cur=scheduleFile();
    sel.innerHTML=list.map(s=>`<option value="${esc(s.file)}"${s.file===cur?" selected":""}>${esc(s.label)}</option>`).join("");
    sel.onchange=()=>{ const p=new URLSearchParams(location.search); p.set("data",sel.value); location.search=p.toString(); };
  }catch(e){
    if(wrap) wrap.style.display="none";   // no manifest → hide the chooser
  }
}
async function boot(){
  loadScheduleMenu();
  const file=scheduleFile();
  try{
    const res=await fetch(file,{cache:"no-cache"});
    if(!res.ok) throw new Error("HTTP "+res.status);
    applySchedule(await res.json());
  }catch(err){
    stage.innerHTML=`<div class="slide show">
      <div class="kicker">Fehler</div>
      <h1 style="font-family:'Bricolage Grotesque';font-weight:800;font-size:24px;margin:10px 0 6px">Schedule konnte nicht geladen werden</h1>
      <div class="cd-for"><b>${esc(file)}</b><br>${esc(String(err&&err.message||err))}</div>
      <div class="anm-hint" style="margin-top:14px">ℹ️ <span>Beim lokalen Öffnen via <b>file://</b> blockiert der Browser <code>fetch</code>. Über einen Webserver (z.&nbsp;B. GitHub Pages) öffnen.</span></div>
    </div>`;
    return;
  }
  buildSlides();
  render();
  setInterval(tick,1000);
  tick();
}
boot();
</script>
